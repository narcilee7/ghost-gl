name: Bug Report
description: Report a bug in ghost-gl
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - ghost-gl-core
        - ghost-gl-react
        - ghost-gl-vue
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: When I try to...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Create a LayoutRuntime with...
        2. Call method...
        3. See error
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Example
      description: Provide a minimal code example that reproduces the issue
      render: typescript
      placeholder: |
        import { LayoutRuntime } from 'ghost-gl-core'

        const runtime = new LayoutRuntime({...})
        // ...

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The node should move to...

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The node remains at...

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details
      value: |
        - ghost-gl version:
        - Node.js version:
        - Browser (if applicable):
        - OS:
    validations:
      required: true

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided a minimal reproduction
          required: true
